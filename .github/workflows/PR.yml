name: PR Verify

on:
  pull_request:
    branches: [ "main" ]
    
jobs:
  pr:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Setup .NET Core SDK
        uses: actions/setup-dotnet@v5.2.0
        
      - name: build
        run: dotnet build 
        
      - name: test
        run: dotnet test